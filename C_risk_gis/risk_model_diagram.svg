<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/><stop offset="1" stop-color="#eef1ee"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e4d6b"/><stop offset="1" stop-color="#0b3d5c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26a37a"/><stop offset="1" stop-color="#178a63"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2a84b"/><stop offset="1" stop-color="#e8912b"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c7bb6"/><stop offset="0.25" stop-color="#abd9e9"/>
      <stop offset="0.5" stop-color="#ffffbf"/><stop offset="0.75" stop-color="#fdae61"/>
      <stop offset="1" stop-color="#d7191c"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#123" flood-opacity="0.18"/>
    </filter>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3a5563"/>
    </marker>
  </defs>

  <rect width="1040" height="660" fill="url(#bg)"/>

  <!-- header -->
  <text x="40" y="46" font-size="27" font-weight="700" fill="#12303d">Dugong-Habitat Risk Model</text>
  <text x="40" y="70" font-size="14.5" fill="#4a6472">Track C · Marawah / Bu Tinah, Abu Dhabi — <tspan font-style="italic">Risk = Value × Threat</tspan> (exposure × consequence)</text>
  <line x1="40" y1="84" x2="1000" y2="84" stroke="#d6cdbb" stroke-width="1.5"/>

  <!-- ===== column 1: INPUTS ===== -->
  <text x="40" y="116" font-size="12.5" font-weight="700" fill="#8a6f3d" letter-spacing="1.5">INPUTS</text>

  <!-- Track B value inputs -->
  <g filter="url(#sh)">
    <rect x="40" y="128" width="212" height="86" rx="12" fill="url(#green)"/>
  </g>
  <text x="58" y="152" font-size="12.5" font-weight="700" fill="#eafaf3">TRACK B — habitat</text>
  <text x="58" y="174" font-size="12.5" fill="#eafaf3">● Seagrass presence (2024)</text>
  <text x="58" y="194" font-size="12.5" fill="#eafaf3">● Seagrass loss (2019→24)</text>

  <!-- Track C threat inputs -->
  <g filter="url(#sh)">
    <rect x="40" y="230" width="212" height="150" rx="12" fill="url(#ocean)"/>
  </g>
  <text x="58" y="254" font-size="12.5" font-weight="700" fill="#cfe8f5">TRACK C — threats (C1)</text>
  <text x="58" y="276" font-size="12" fill="#eaf5fb">● Coastal development / dredging</text>
  <text x="58" y="296" font-size="12" fill="#eaf5fb">● Desalination / industrial discharge</text>
  <text x="58" y="316" font-size="12" fill="#eaf5fb">● Vessel / boat pressure</text>
  <text x="58" y="336" font-size="12" fill="#eaf5fb">● Thermal stress (Landsat SST)</text>
  <text x="58" y="356" font-size="12" fill="#eaf5fb">● Dugong-use + protected cores</text>

  <!-- ===== column 2: NORMALIZE ===== -->
  <text x="300" y="116" font-size="12.5" font-weight="700" fill="#8a6f3d" letter-spacing="1.5">NORMALIZE</text>
  <g filter="url(#sh)">
    <rect x="298" y="150" width="128" height="210" rx="12" fill="#ffffff" stroke="#d9d0be"/>
  </g>
  <text x="362" y="180" font-size="12.5" font-weight="700" fill="#12303d" text-anchor="middle">Rescale</text>
  <text x="362" y="198" font-size="12.5" font-weight="700" fill="#12303d" text-anchor="middle">each layer</text>
  <text x="362" y="222" font-size="19" font-weight="700" fill="#178a63" text-anchor="middle">0 → 1</text>
  <text x="362" y="252" font-size="11" fill="#4a6472" text-anchor="middle">on a shared</text>
  <text x="362" y="268" font-size="11" fill="#4a6472" text-anchor="middle">10 m grid, so no</text>
  <text x="362" y="284" font-size="11" fill="#4a6472" text-anchor="middle">factor dominates</text>
  <text x="362" y="300" font-size="11" fill="#4a6472" text-anchor="middle">by unit scale.</text>
  <text x="362" y="326" font-size="10.5" fill="#8a6f3d" text-anchor="middle">points → exp(−d/λ)</text>
  <text x="362" y="342" font-size="10.5" fill="#8a6f3d" text-anchor="middle">distance decay</text>

  <!-- ===== column 3: COMBINE ===== -->
  <text x="470" y="116" font-size="12.5" font-weight="700" fill="#8a6f3d" letter-spacing="1.5">COMBINE (C2–C3)</text>

  <!-- Value box -->
  <g filter="url(#sh)"><rect x="470" y="150" width="196" height="70" rx="12" fill="url(#green)"/></g>
  <text x="568" y="176" font-size="13.5" font-weight="700" fill="#eafaf3" text-anchor="middle">VALUE  (what's at stake)</text>
  <text x="568" y="200" font-size="11.5" fill="#eafaf3" text-anchor="middle">seagrass × (0.6 + 0.4·dugong-use)</text>

  <!-- Threat box with weights -->
  <g filter="url(#sh)"><rect x="470" y="234" width="196" height="126" rx="12" fill="url(#ocean)"/></g>
  <text x="568" y="258" font-size="13.5" font-weight="700" fill="#cfe8f5" text-anchor="middle">THREAT  (Σ wᵢ·threatᵢ)</text>
  <text x="484" y="280" font-size="11" fill="#eaf5fb">loss</text>            <text x="652" y="280" font-size="11" font-weight="700" fill="#ffd9a0" text-anchor="end">0.30</text>
  <text x="484" y="298" font-size="11" fill="#eaf5fb">development</text>     <text x="652" y="298" font-size="11" font-weight="700" fill="#ffd9a0" text-anchor="end">0.20</text>
  <text x="484" y="316" font-size="11" fill="#eaf5fb">thermal (SST)</text>    <text x="652" y="316" font-size="11" font-weight="700" fill="#ffd9a0" text-anchor="end">0.20</text>
  <text x="484" y="334" font-size="11" fill="#eaf5fb">discharge</text>       <text x="652" y="334" font-size="11" font-weight="700" fill="#ffd9a0" text-anchor="end">0.15</text>
  <text x="484" y="352" font-size="11" fill="#eaf5fb">vessel</text>          <text x="652" y="352" font-size="11" font-weight="700" fill="#ffd9a0" text-anchor="end">0.15</text>

  <!-- multiply glyph -->
  <circle cx="700" cy="255" r="19" fill="#12303d" filter="url(#sh)"/>
  <text x="700" y="262" font-size="22" font-weight="700" fill="#fff" text-anchor="middle">×</text>

  <!-- ===== column 4: RISK ===== -->
  <text x="748" y="116" font-size="12.5" font-weight="700" fill="#8a6f3d" letter-spacing="1.5">RISK INDEX (C3–C4)</text>
  <g filter="url(#sh)"><rect x="748" y="150" width="252" height="86" rx="12" fill="#12303d"/></g>
  <text x="874" y="180" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Risk to dugong habitat</text>
  <text x="874" y="204" font-size="12" fill="#c6d6de" text-anchor="middle">Value × Threat → rescale 0–1</text>
  <text x="874" y="222" font-size="12" fill="#c6d6de" text-anchor="middle">→ 5 ranked classes</text>

  <!-- risk gradient spine (signature element) -->
  <g filter="url(#sh)"><rect x="748" y="252" width="252" height="26" rx="7" fill="url(#risk)"/></g>
  <text x="748" y="298" font-size="10.5" fill="#4a6472">Very low</text>
  <text x="1000" y="298" font-size="10.5" fill="#4a6472" text-anchor="end">Very high</text>

  <!-- hotspots + dashboard -->
  <g filter="url(#sh)"><rect x="748" y="312" width="252" height="48" rx="12" fill="url(#amber)"/></g>
  <text x="874" y="333" font-size="12.5" font-weight="700" fill="#4a2c05" text-anchor="middle">Ranked hotspots → Track D</text>
  <text x="874" y="350" font-size="10.5" fill="#5c3a08" text-anchor="middle">area · mean risk · dominant threat</text>

  <!-- ===== connectors ===== -->
  <g stroke="#3a5563" stroke-width="2" fill="none">
    <path d="M252,171 C275,171 275,210 296,210" marker-end="url(#arw)"/>
    <path d="M252,300 C275,300 275,250 296,255" marker-end="url(#arw)"/>
    <path d="M426,210 C445,210 448,185 468,185" marker-end="url(#arw)"/>
    <path d="M426,255 C445,255 448,290 468,295" marker-end="url(#arw)"/>
    <path d="M666,185 C682,185 688,225 699,236" marker-end="url(#arw)"/>
    <path d="M666,297 C682,297 688,278 699,270" marker-end="url(#arw)"/>
    <path d="M719,255 C735,255 730,192 746,192" marker-end="url(#arw)"/>
    <path d="M874,278 L874,310" marker-end="url(#arw)"/>
  </g>

  <!-- footer band: sanity check (C5) -->
  <g filter="url(#sh)"><rect x="40" y="404" width="960" height="88" rx="12" fill="#ffffff" stroke="#d9d0be"/></g>
  <text x="60" y="430" font-size="12.5" font-weight="700" fill="#8a6f3d" letter-spacing="1">SANITY CHECKS &amp; SENSITIVITY  (C5)</text>
  <text x="60" y="454" font-size="12" fill="#33505c">① Hotspots line up with real threats (e.g. Mirfa desalination plant, dredging coast) — not open, calm water.</text>
  <text x="60" y="472" font-size="12" fill="#33505c">② Zonal risk reported inside vs. outside the Bu Tinah / Marawah protected cores.</text>
  <text x="60" y="490" font-size="12" fill="#33505c">③ Each weight perturbed ±0.10 and re-ranked — hotspots that persist are reported as <tspan font-weight="700">robust</tspan>.</text>

  <!-- footer note -->
  <text x="40" y="524" font-size="11" fill="#7d8a90">Data: Copernicus Sentinel-2 &amp; Landsat 8/9 (via Google Earth Engine) · EAD habitat layers · MMPATF Southern Gulf IMMA.</text>
  <text x="40" y="542" font-size="11" fill="#7d8a90">Method after InVEST Habitat Risk Assessment (exposure × consequence) &amp; Halpern et al. (2008) cumulative human impact. Weights are documented &amp; tunable — see RISK_METHODOLOGY.md.</text>

  <!-- dugong motif (simple, tasteful) -->
  <g transform="translate(905,560)" opacity="0.9">
    <path d="M8,22 C2,14 14,6 34,10 C48,13 60,10 70,4 C64,14 66,22 60,28 C48,36 24,36 14,30 C18,28 14,24 8,22 Z"
          fill="#0e4d6b"/>
    <path d="M70,4 C74,2 80,4 82,10 C76,10 72,10 66,12 Z" fill="#0e4d6b"/>
    <circle cx="20" cy="20" r="1.7" fill="#f7f3ea"/>
  </g>
  <text x="40" y="600" font-size="10.5" fill="#9aa7ac">Dugong Watch · Prototypes for Humanity 2026 · Track C — Risk Layer &amp; GIS</text>
</svg>
