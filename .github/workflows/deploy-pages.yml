name: Deploy dashboard to GitHub Pages

# Publishes the static Track D dashboard (D_dashboard/) to GitHub Pages.
# The site root is the contents of D_dashboard/, so index.html loads at the
# repo's Pages URL: https://abdulkarimbisharah.github.io/dugong-uae/

on:
  push:
    branches: [main]
    paths:
      - "D_dashboard/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload D_dashboard as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: D_dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
